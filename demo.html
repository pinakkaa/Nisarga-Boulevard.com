<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --surface: #ffffff;
      --border: #e8e4de;
      --border-mid: #d0c9be;
      --accent: #2a2a2a;
      --gold: #b07d4f;
      --text: #1a1a1a;
      --muted: #9a9590;
      --light: #f3ede6;
      --shadow-sm: rgba(0,0,0,0.06);
      --shadow-md: rgba(0,0,0,0.13);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px 80px;
      overflow-x: hidden;
    }

    /* subtle grid */
    /* body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 52px 52px;
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    } */

    /* ── Header ────────────────────────────────── */
    .gallery-header {
      text-align: center;
      margin-bottom: 56px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.8s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
    }
    .eyebrow::before, .eyebrow::after {
      content: '';
      width: 30px; height: 1px;
      background: var(--gold);
      opacity: 0.55;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      line-height: 1.12;
      letter-spacing: -0.02em;
    }
    h1 em { font-style: italic; color: var(--gold); }

    .tagline {
      margin-top: 14px;
      font-size: 12.5px;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── Slider ────────────────────────────────── */
    .slider-section {
      position: relative;
      width: 100%;
      max-width: 1160px;
      z-index: 1;
      animation: fadeUp 0.9s 0.12s ease both;
    }

    /* fade edges */
    .slider-section::before, .slider-section::after {
      content: '';
      position: absolute;
      top: 0; bottom: 60px; /* don't overlap footer */
      width: 90px;
      z-index: 5;
      pointer-events: none;
    }
    .slider-section::before { left: 0; background: linear-gradient(to right, var(--bg), transparent); }
    .slider-section::after  { right: 0; background: linear-gradient(to left, var(--bg), transparent); }

    .slider-viewport { overflow: hidden; }

    .slider-track {
      display: flex;
      gap: 20px;
      will-change: transform;
      /* transition injected by JS */
    }

    /* ── Slide ─────────────────────────────────── */
    .slide {
      min-width: 300px;
      flex-shrink: 0;
      cursor: pointer;
      border-radius: 6px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 3px 14px var(--shadow-sm);
      transition: box-shadow 0.35s ease, transform 0.35s ease;
    }
    .slide:hover {
      box-shadow: 0 14px 44px var(--shadow-md);
      transform: translateY(-5px);
    }

    .slide-img-wrap {
      overflow: hidden;
      /* aspect-ratio: 3/4; */
      position: relative;
    }
    .slide img {
      width: 100%; 
      height: 150px;
      object-fit: cover;
      display: block;
      transition: transform 0.65s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.4s ease;
      filter: brightness(0.95) saturate(0.92);
    }
    .slide:hover img { transform: scale(1.07); filter: brightness(1) saturate(1.06); }

    /* caption */
    .slide-caption {
      padding: 14px 16px 15px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cap-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.88rem;
      font-weight: 400;
    }
    .cap-sub {
      font-size: 9.5px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 3px;
    }
    .expand-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1px solid var(--border-mid);
      background: var(--light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-left: 10px;
      transition: background 0.22s, border-color 0.22s;
    }
    .slide:hover .expand-btn { background: var(--gold); border-color: var(--gold); }
    .expand-btn svg { width: 11px; height: 11px; fill: none; stroke: var(--muted); stroke-width: 1.8; transition: stroke 0.22s; }
    .slide:hover .expand-btn svg { stroke: #fff; }

    /* ── Arrows ────────────────────────────────── */
    .arrow {
      position: absolute;
      top: calc(50% - 28px);
      transform: translateY(-50%);
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 1.5px solid var(--border-mid);
      background: var(--surface);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
      box-shadow: 0 4px 18px var(--shadow-sm);
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s, color 0.25s, transform 0.25s;
      color: var(--text);
    }
    .arrow:hover {
      border-color: var(--gold);
      background: var(--gold);
      color: #fff;
      box-shadow: 0 8px 28px rgba(176,125,79,0.3);
      transform: translateY(-50%) scale(1.1);
    }
    .arrow svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.8; }
    .arrow-prev { left: -24px; }
    .arrow-next { right: -24px; }

    /* ── Footer dots ───────────────────────────── */
    .slider-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 28px;
    }
    .dots { display: flex; gap: 7px; align-items: center; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border-mid);
      border: none;
      cursor: pointer;
      padding: 0;
      transition: background 0.28s, width 0.28s, border-radius 0.28s;
    }
    .dot.active { background: var(--gold); width: 22px; border-radius: 3px; }
    .counter {
      font-size: 11px;
      letter-spacing: 0.22em;
      color: var(--muted);
      font-weight: 300;
    }
    .counter strong { color: var(--gold); font-weight: 400; }

    /* ── Lightbox ──────────────────────────────── */
    .lightbox {
      position: fixed; inset: 0;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.38s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { opacity: 1; pointer-events: all; }

    .lb-backdrop {
      position: absolute; inset: 0;
      background: rgba(250,250,248,0.91);
      backdrop-filter: blur(24px) saturate(1.15);
      cursor: pointer;
    }

    .lb-inner {
      position: relative; z-index: 2;
      display: flex; align-items: center; gap: 20px;
      padding: 20px;
      max-width: 980px; width: 100%;
    }

    .lb-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.16);
      max-width: 500px;
      width: 100%;
      margin: 0 auto;
      transform: scale(0.92) translateY(10px);
      transition: transform 0.45s cubic-bezier(0.34,1.45,0.64,1);
    }
    .lightbox.open .lb-card { transform: scale(1) translateY(0); }

    .lb-card img {
      width: 100%;
      max-height: 70vh;
      object-fit: cover;
      display: block;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .lb-card-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .lb-card-footer .cap-title { font-size: 1rem; }
    .lb-page {
      font-size: 10.5px;
      letter-spacing: 0.22em;
      color: var(--muted);
      font-weight: 300;
    }
    .lb-page strong { color: var(--gold); font-weight: 400; }

    /* close */
    .lb-close {
      position: absolute;
      top: 14px; right: 14px;
      z-index: 3;
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1.5px solid var(--border-mid);
      background: var(--surface);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 12px var(--shadow-sm);
      transition: background 0.2s, border-color 0.2s, transform 0.3s;
    }
    .lb-close:hover { background: #e04; border-color: #e04; transform: rotate(90deg) scale(1.1); }
    .lb-close svg { width: 14px; height: 14px; fill: none; stroke: var(--muted); stroke-width: 2; transition: stroke 0.2s; }
    .lb-close:hover svg { stroke: #fff; }

    .lb-arrow {
      width: 50px; height: 50px;
      border-radius: 50%;
      border: 1.5px solid var(--border-mid);
      background: var(--surface);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 16px var(--shadow-sm);
      transition: background 0.22s, border-color 0.22s, color 0.22s, transform 0.22s, box-shadow 0.22s;
      color: var(--text);
    }
    .lb-arrow:hover {
      background: var(--gold); border-color: var(--gold); color: #fff;
      box-shadow: 0 8px 28px rgba(176,125,79,0.3);
      transform: scale(1.1);
    }
    .lb-arrow svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.8; }

    /* thumbnails */
    .lb-thumbs {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      z-index: 3;
    }
    .lb-thumb {
      width: 44px; height: 30px;
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
      opacity: 0.35;
      border: 1.5px solid transparent;
      transition: opacity 0.2s, transform 0.2s, border-color 0.2s;
    }
    .lb-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .lb-thumb.active { opacity: 1; border-color: var(--gold); transform: scaleY(1.14); }
    .lb-thumb:hover:not(.active) { opacity: 0.65; }

    /* ── Responsive ────────────────────────────── */
    @media (max-width: 900px) { .slide { min-width: 260px; } }
    @media (max-width: 640px) {
      .slide { min-width: 220px; }
      .arrow-prev { left: -10px; }
      .arrow-next { right: -10px; }
      .lb-inner { gap: 10px; padding: 12px; }
      .lb-arrow { width: 38px; height: 38px; }
      .lb-thumbs { display: none; }
      .slider-section::before, .slider-section::after { width: 44px; }
    }
  </style>
</head>
<body>

  <header class="gallery-header">
    <p class="eyebrow">Visual Collection</p>
    <h1>Our <em>Gallery</em></h1>
    <!-- <p class="tagline">Click any image to view full screen &nbsp;·&nbsp; Arrows or swipe to explore</p> -->
  </header>

  <section class="slider-section">
    <button class="arrow arrow-prev" id="prevBtn" aria-label="Previous">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>

    <div class="slider-viewport">
      <div class="slider-track" id="sliderTrack"></div>
    </div>

    <button class="arrow arrow-next" id="nextBtn" aria-label="Next">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <div class="slider-footer">
      <div class="dots" id="dots"></div>
      <p class="counter" id="counter"></p>
    </div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <div class="lb-backdrop" id="lbBackdrop"></div>

    <button class="lb-close" id="lbClose" aria-label="Close">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>

    <div class="lb-inner">
      <button class="lb-arrow" id="lbPrev" aria-label="Previous">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>

      <div class="lb-card">
        <img id="lbImg" src="" alt="" />
        <div class="lb-card-footer">
          <div>
            <p class="cap-title" id="lbTitle"></p>
            <p class="cap-sub"  id="lbSub"></p>
          </div>
          <p class="lb-page"><strong id="lbCur">1</strong> / <span id="lbTot">1</span></p>
        </div>
      </div>

      <button class="lb-arrow" id="lbNext" aria-label="Next">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <div class="lb-thumbs" id="lbThumbs"></div>
  </div>

  <script>
    /* ── Data ──────────────────────────────────────────────────────────── */
    const images = [
      { src:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&q=80', title:'Mountain Solitude', sub:'Landscape · Alps'      },
      { src:'https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=900&q=80', title:'Forest Path',       sub:'Nature · Woodland'     },
      { src:'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=900&q=80', title:'Golden Hour',       sub:'Landscape · Dusk'      },
      { src:'https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=900&q=80', title:'Cascade Falls',     sub:'Nature · Water'        },
      { src:'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=900&q=80', title:'Open Fields',       sub:'Landscape · Aerial'    },
      { src:'https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=900&q=80', title:'Desert Bloom',      sub:'Nature · Arid'         },
      { src:'https://images.unsplash.com/photo-1520116468816-95b69f847357?w=900&q=80', title:'Ocean Stillness',   sub:'Seascape · Shore'      },
      { src:'https://images.unsplash.com/photo-1444464666168-49d633b86797?w=900&q=80', title:'Feathered Flight',  sub:'Wildlife · Birds'      },
      { src:'https://images.unsplash.com/photo-1484950763426-56b5bf172dbb?w=900&q=80', title:'Morning Mist',      sub:'Landscape · Dawn'      },
    ];

    /* ── Infinite Slider ────────────────────────────────────────────────── */
    const ORIG   = images.length;
    const CLONES = 4;   // clones on each side
    const GAP    = 20;

    const track   = document.getElementById('sliderTrack');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const dotsEl  = document.getElementById('dots');
    const counterEl = document.getElementById('counter');

    // full set: [clone-tail … original … clone-head]
    const fullSet = [
      ...images.slice(-CLONES),
      ...images,
      ...images.slice(0, CLONES),
    ];

    // Render slides
    fullSet.forEach((img, i) => {
      const realIdx = ((i - CLONES) % ORIG + ORIG) % ORIG;
      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.innerHTML = `
        <div class="slide-img-wrap">
          <img src="${img.src}" alt="${img.title}" loading="lazy" />
        </div>
        `;
      slide.addEventListener('click', () => openLightbox(realIdx));
      track.appendChild(slide);
    });

    /* ── State ─────────────────────────────────────────────────────────── */
    let curReal     = 0;      // 0-based real index
    let isAnimating = false;
    let autoTimer;

    function slideW() {
      const s = track.querySelector('.slide');
      return s ? s.offsetWidth + GAP : 320;
    }

    // track index of a real index
    function t(real) { return real + CLONES; }

    function applyTransform(trackIdx, animate) {
      if (animate) {
        track.style.transition = 'transform 0.60s cubic-bezier(0.77,0,0.175,1)';
      } else {
        track.style.transition = 'none';
      }
      track.style.transform = `translateX(-${trackIdx * slideW()}px)`;
    }

    function refreshUI() {
      // dots
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === curReal));
      // counter
    }

    function goDir(dir) {
      if (isAnimating) return;
      isAnimating = true;

      const fromTrack = t(curReal);
      const toTrack   = fromTrack + dir;

      applyTransform(toTrack, true);

      setTimeout(() => {
        curReal = (curReal + dir + ORIG) % ORIG;
        applyTransform(t(curReal), false);
        isAnimating = false;
        refreshUI();
      }, 620);
    }

    // initialise
    applyTransform(t(curReal), false);
    refreshUI();

    // Build dots
    for (let i = 0; i < ORIG; i++) {
      const d = document.createElement('button');
      d.className = 'dot' + (i === curReal ? ' active' : '');
      d.setAttribute('aria-label', `Image ${i + 1}`);
      d.addEventListener('click', () => {
        if (isAnimating) return;
        curReal = i;
        applyTransform(t(curReal), false);
        refreshUI();
      });
      dotsEl.appendChild(d);
    }

    prevBtn.addEventListener('click', () => goDir(-1));
    nextBtn.addEventListener('click', () => goDir(1));

    // Auto-play
    function startAuto() { clearInterval(autoTimer); autoTimer = setInterval(() => goDir(1), 3800); }
    function stopAuto()  { clearInterval(autoTimer); }
    startAuto();
    track.parentElement.addEventListener('mouseenter', stopAuto);
    track.parentElement.addEventListener('mouseleave', startAuto);

    // Keyboard
    document.addEventListener('keydown', e => {
      if (document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'ArrowLeft')  goDir(-1);
      if (e.key === 'ArrowRight') goDir(1);
    });

    // Touch swipe
    let tx0 = 0;
    track.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; stopAuto(); }, { passive: true });
    track.addEventListener('touchend',   e => {
      const d = tx0 - e.changedTouches[0].clientX;
      if (Math.abs(d) > 40) goDir(d > 0 ? 1 : -1);
      startAuto();
    });

    window.addEventListener('resize', () => applyTransform(t(curReal), false));

    /* ── Lightbox ───────────────────────────────────────────────────────── */
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lbImg');
    const lbTitle  = document.getElementById('lbTitle');
    const lbSub    = document.getElementById('lbSub');
    const lbCur    = document.getElementById('lbCur');
    const lbTot    = document.getElementById('lbTot');
    const lbThumbs = document.getElementById('lbThumbs');
    const lbPrev   = document.getElementById('lbPrev');
    const lbNext   = document.getElementById('lbNext');
    let lbIdx = 0;

    lbTot.textContent = ORIG;

    // Build thumbnails
    images.forEach((img, i) => {
      const t2 = document.createElement('div');
      t2.className = 'lb-thumb';
      t2.innerHTML = `<img src="${img.src}" alt="${img.title}" loading="lazy" />`;
      t2.addEventListener('click', () => setLightbox(i));
      lbThumbs.appendChild(t2);
    });

    function setLightbox(idx) {
      lbIdx = (idx + ORIG) % ORIG;
      const img = images[lbIdx];

      lbImg.style.opacity   = '0';
      lbImg.style.transform = 'scale(0.97)';
      lbImg.style.transition = 'opacity 0.18s, transform 0.18s';

      setTimeout(() => {
        lbImg.src = img.src; lbImg.alt = img.title;
        lbTitle.textContent = img.title;
        lbSub.textContent   = img.sub;
        lbCur.textContent   = lbIdx + 1;
        lbImg.style.opacity = '1'; lbImg.style.transform = 'scale(1)';
      }, 170);

      document.querySelectorAll('.lb-thumb').forEach((el, i) => el.classList.toggle('active', i === lbIdx));
    }

    function openLightbox(idx) {
      setLightbox(idx);
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
      stopAuto();
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      startAuto();
    }

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbBackdrop').addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', () => setLightbox(lbIdx - 1));
    lbNext.addEventListener('click', () => setLightbox(lbIdx + 1));

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')     closeLightbox();
      if (e.key === 'ArrowLeft')  setLightbox(lbIdx - 1);
      if (e.key === 'ArrowRight') setLightbox(lbIdx + 1);
    });

    let lbTx = 0;
    lightbox.addEventListener('touchstart', e => { lbTx = e.touches[0].clientX; }, { passive: true });
    lightbox.addEventListener('touchend',   e => {
      const d = lbTx - e.changedTouches[0].clientX;
      if (Math.abs(d) > 40) setLightbox(lbIdx + (d > 0 ? 1 : -1));
    });
  </script>
</body>
</html>
